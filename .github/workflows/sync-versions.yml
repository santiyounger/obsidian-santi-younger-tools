name: Sync versions.json with GitHub releases

on:
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Build and write versions.json from releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const map = {};
            for (const rel of releases) {
              const tag = rel.tag_name;
              if (!tag) continue;
              try {
                const file = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: 'manifest.json',
                  ref: tag,
                });
                const content = Buffer.from(file.data.content, 'base64').toString('utf8');
                const manifest = JSON.parse(content);
                if (manifest?.minAppVersion && manifest?.version) {
                  map[manifest.version] = manifest.minAppVersion;
                }
              } catch {
                continue;
              }
            }
            const keys = Object.keys(map).sort((a, b) => {
              const pa = a.split('.').map((n) => parseInt(n, 10));
              const pb = b.split('.').map((n) => parseInt(n, 10));
              for (let i = 0; i < 3; i++) {
                if ((pa[i] || 0) !== (pb[i] || 0)) return (pa[i] || 0) - (pb[i] || 0);
              }
              return 0;
            });
            const ordered = {};
            for (const k of keys) ordered[k] = map[k];
            fs.writeFileSync('versions.json', `${JSON.stringify(ordered, null, '\t')}\n`);

      - name: Commit and push if changed
        run: |
          BRANCH='${{ github.event.repository.default_branch }}'
          if git diff --quiet -- versions.json; then
            echo "No changes to versions.json";
            exit 0;
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: sync versions.json with releases [skip ci]"
          git push origin "HEAD:${BRANCH}"
