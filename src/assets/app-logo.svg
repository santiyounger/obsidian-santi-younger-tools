<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="32" y="32" width="448" height="448" fill="#0F172A" />
  <rect x="40" y="40" width="432" height="432" stroke="#1E293B" stroke-width="8" />

  <!-- Minimal plugin symbol: two interlocking geometric modules -->
  <rect x="136" y="136" width="152" height="152" fill="#38BDF8" />
  <rect x="224" y="224" width="152" height="152" fill="#7DD3FC" />

  <!-- Square notches to imply connection points (no curves) -->
  <rect x="288" y="184" width="40" height="56" fill="#0F172A" />
  <rect x="184" y="288" width="56" height="40" fill="#0F172A" />

  <!-- Alignment cut to keep mark crisp and balanced -->
  <rect x="224" y="224" width="64" height="64" fill="#0F172A" />
</svg>
